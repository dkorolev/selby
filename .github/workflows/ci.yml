name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Unit tests
        run: swift run -c release selby-tests
      - name: Assemble app bundle
        run: scripts/build.sh
